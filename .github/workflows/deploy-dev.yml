name: Build and Deploy Dev

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: 127.0.0.1:5001
  IMAGE_NAME: skyress
  RELEASE_NAME: skyress
  NAMESPACE: dev
  KUBECONFIG: /home/github-runner/.kube/deployer-configs/dev.yaml

jobs:
  build-push-deploy:
    name: Build, push, and deploy to dev
    runs-on: [self-hosted, local-wsl]
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runner tooling
        shell: bash
        run: |
          set -euo pipefail
          docker version
          kubectl version --client=true
          helm version
          kubectl auth can-i get deployments -n "${NAMESPACE}"

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build \
            --file Skyress/Dockerfile \
            --tag "${IMAGE}" \
            .
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Push Docker image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${IMAGE}"

      - name: Create or update app secret
        shell: bash
        env:
          SKYRESS_DB_CONNECTION_STRING: ${{ secrets.SKYRESS_DB_CONNECTION_STRING }}
          SKYRESS_RABBITMQ_CONNECTION_STRING: ${{ secrets.SKYRESS_RABBITMQ_CONNECTION_STRING }}
          SKYRESS_JWT_SECRET_KEY: ${{ secrets.SKYRESS_JWT_SECRET_KEY }}
        run: |
          set -euo pipefail
          : "${SKYRESS_DB_CONNECTION_STRING:?Set repository secret SKYRESS_DB_CONNECTION_STRING}"
          : "${SKYRESS_RABBITMQ_CONNECTION_STRING:?Set repository secret SKYRESS_RABBITMQ_CONNECTION_STRING}"
          : "${SKYRESS_JWT_SECRET_KEY:?Set repository secret SKYRESS_JWT_SECRET_KEY}"

          kubectl -n "${NAMESPACE}" create secret generic skyress-app-secrets \
            --from-literal=ConnectionStrings__SkyressDb="${SKYRESS_DB_CONNECTION_STRING}" \
            --from-literal=ConnectionStrings__RabbitMq="${SKYRESS_RABBITMQ_CONNECTION_STRING}" \
            --from-literal=Jwt__SecretKey="${SKYRESS_JWT_SECRET_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Resolve ServiceMonitor access
        shell: bash
        run: |
          set -euo pipefail
          SERVICE_MONITOR_ENABLED=false

          if kubectl api-resources --api-group=monitoring.coreos.com | grep -q '^servicemonitors'; then
            if kubectl auth can-i get servicemonitors.monitoring.coreos.com -n "${NAMESPACE}" >/dev/null 2>&1 \
              && kubectl auth can-i create servicemonitors.monitoring.coreos.com -n "${NAMESPACE}" >/dev/null 2>&1 \
              && kubectl auth can-i update servicemonitors.monitoring.coreos.com -n "${NAMESPACE}" >/dev/null 2>&1 \
              && kubectl auth can-i patch servicemonitors.monitoring.coreos.com -n "${NAMESPACE}" >/dev/null 2>&1 \
              && kubectl auth can-i delete servicemonitors.monitoring.coreos.com -n "${NAMESPACE}" >/dev/null 2>&1; then
              SERVICE_MONITOR_ENABLED=true
            else
              echo "::warning::ServiceMonitor CRD exists, but this deployer cannot manage servicemonitors.monitoring.coreos.com in namespace ${NAMESPACE}. Deploying without ServiceMonitor. Grant get,list,watch,create,update,patch,delete on servicemonitors to system:serviceaccount:${NAMESPACE}:gitlab-deployer to enable Prometheus Operator scraping."
            fi
          else
            echo "::warning::ServiceMonitor CRD is not installed. Deploying without ServiceMonitor."
          fi

          echo "SERVICE_MONITOR_ENABLED=${SERVICE_MONITOR_ENABLED}" >> "${GITHUB_ENV}"

      - name: Deploy with Helm
        shell: bash
        run: |
          set -euo pipefail
          helm upgrade --install "${RELEASE_NAME}" ./charts/skyress \
            --namespace "${NAMESPACE}" \
            --set image.repository="${REGISTRY}/${IMAGE_NAME}" \
            --set image.tag="${GITHUB_SHA}" \
            --set autoscaling.enabled=true \
            --set autoscaling.minReplicas=1 \
            --set autoscaling.maxReplicas=5 \
            --set-string autoscaling.targetRPS=10 \
            --set metrics.enabled=true \
            --set metrics.path=/metrics \
            --set metrics.port=http \
            --set serviceMonitor.enabled="${SERVICE_MONITOR_ENABLED}" \
            --wait \
            --timeout 5m

      - name: Show rollout status
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" rollout status deployment/"${RELEASE_NAME}" --timeout=2m
          kubectl -n "${NAMESPACE}" get deployment,svc,pods -l app.kubernetes.io/instance="${RELEASE_NAME}"
